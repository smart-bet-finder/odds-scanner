name: 90min Odds Scan
on:
  schedule:
    - cron: '0 */1 * * *' # Ovo će raditi na svakih sat i po (približno)
  workflow_dispatch: # Dozvoljava ti da pokreneš sken ručno kad god želiš

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Fetch API Data
        run: |
          mkdir -p public
          curl "https://api.the-odds-api.com/v4/sports/soccer_epl/odds/?apiKey=8d79681b1e42354408fb13d12b34887d&regions=eu&markets=h2h" -o public/data.json
          
      - name: Commit and Push Data
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add public/data.json
          git commit -m "Automated Odds Update (90min cycle)" || exit 0
          git push
