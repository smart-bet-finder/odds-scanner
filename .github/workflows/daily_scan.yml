name: 90min Odds Scan
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.MY_TOKEN }}

      - name: Fetch API Data
        run: |
          # 1. Kreiramo folder public ako ne postoji (ovo je popravka za Error 23)
          mkdir -p public
          
          # 2. Povlačimo podatke sa API-ja i čuvamo ih direktno u folder
          curl "https://api.the-odds-api.com/v4/sports/soccer_epl/odds/?apiKey=8d79681b1e42354408fb13d12b34887d&regions=eu&markets=h2h" -o public/data.json
          
          # 3. Kopiramo fajl i u glavni (root) direktorijum radi sigurnosti učitavanja
          cp public/data.json data.json
          
      - name: Commit and Push Data
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add public/data.json data.json
          git commit -m "Automated Odds Update (90min cycle)" || exit 0
          git push
